<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Pre-Booking Clothes - Modern Black & White Theme</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #fff;
            color: #111;
        }

        /* PRODUCT CARD */
        .product-card {
            background: #fff;
            border-radius: 16px;
            padding: 15px;
            transition: 0.3s;
            cursor: pointer;
            position: relative;
            border: 1px solid #e0e0e0;
        }

        .product-card:hover {
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.08);
        }

        .product-card img {
            width: 100%;
            border-radius: 14px;
        }

        .prebook-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #000;
            color: #fff;
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 600;
        }

        /* MODAL */
        .modal-content {
            padding: 20px;
            border-radius: 16px;
            border: none;
        }

        .modal-header {
            border: none;
            padding-bottom: 0;
        }

        /* MAIN IMAGE */
        .main-img {
            width: 100%;
            border-radius: 16px;
            object-fit: contain;
            max-height: 450px;
            background: #f7f7f7;
            box-shadow: 0 0 15px rgb(0 0 0 / 0.05);
        }

        /* COLOR THUMBNAIL */
        .color-thumb {
            width: 90px;
            height: 110px;
            border: 1.5px solid #ccc;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            margin-right: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f5f5f5;
            transition: all 0.3s;
        }

        .color-thumb img {
            max-width: 80px;
            max-height: 100px;
            object-fit: contain;
            pointer-events: none;
        }

        .color-thumb:hover {
            border-color: #000;
        }

        .color-thumb.selected {
            border-color: #000;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
        }

        /* Color name */
        #colorName {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 15px;
        }

        /* SIZE SELECTION */
        .sizes-grid {
            display: grid;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            gap: 10px;
            margin-bottom: 10px;
        }

        .size-box {
            text-align: center;
            border: 1.5px solid #ccc;
            padding: 12px 0;
            font-size: 14px;
            cursor: pointer;
            user-select: none;
            border-radius: 8px;
            transition: all 0.3s;
            background: #fff;
        }

        .size-box.selected {
            border-color: #000;
            font-weight: 700;
            background-color: #f0f0f0;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .size-box.disabled {
            color: #aaa;
            cursor: not-allowed;
            text-decoration: line-through;
            border-color: #e0e0e0;
            background-color: #fafafa;
        }

        /* PREBOOK BUTTON */
        .prebook-btn {
            background: #000;
            color: #fff;
            border: none;
            border-radius: 30px;
            padding: 14px 28px;
            font-weight: 600;
            width: 100%;
            transition: background 0.3s;
            user-select: none;
        }

        .prebook-btn:hover {
            background: #222;
        }

        /* ERROR MESSAGE */
        .error-msg {
            color: #cc0000;
            font-size: 13px;
            margin-bottom: 15px;
            display: none;
        }

        /* Price styles */
        .price-wrapper {
            margin-bottom: 12px;
        }

        .mrp-price {
            text-decoration: line-through;
            color: #888;
            font-size: 16px;
            margin-right: 10px;
        }

        .sale-price {
            font-weight: 700;
            font-size: 20px;
            color: #111;
        }

        /* Advance and delivery info */
        .advance-delivery {
            font-size: 14px;
            color: #555;
            margin-bottom: 20px;
        }

        /* Alerts */
        .alert-warning {
            background-color: #fff8e1;
            border-color: #ffe082;
            color: #555;
            font-size: 13px;
        }
    </style>
</head>

<body>

    <div class="container py-5">
        <h2 class="fw-bold mb-4">🖤 Pre-Book Collection</h2>
        <div class="row g-4">
            <!-- PRODUCT CARD -->
            <div class="col-md-3">
                <div class="product-card" data-bs-toggle="modal" data-bs-target="#productModal" data-name="PB-2001"
                    data-price="1999" data-sale="1499" data-advance="499" data-delivery="Dispatch in 15–20 days"
                    data-colors='["orange","black"]' data-sizes='["0-2","2-5"]' data-images='[
          {"color":"orange","size":"0-2","img":"https://www.fayonkids.com/cdn/shop/files/manufactured-by-fayon-kids-noida-u-p-orange-neoprene-dress-for-girls-40946025365760.jpg"},
          {"color":"orange","size":"2-5","img":"https://medias.utsavfashion.com/media/catalog/product/cache/1/small_image/295x/040ec09b1e35df139433887a97daa66f/b/a/bandhej-printed-cotton-kurta-set-in-orange-v1-utj1230.jpg"},
          {"color":"black","size":"0-2","img":"https://picsum.photos/500/600?3"},
          {"color":"black","size":"2-5","img":"https://picsum.photos/500/600?4"}
        ]'>
                    <span class="prebook-badge">Pre-Book</span>
                    <img src="https://www.fayonkids.com/cdn/shop/files/manufactured-by-fayon-kids-noida-u-p-orange-neoprene-dress-for-girls-40946025365760.jpg"
                        alt="PB-2001" />
                    <h6 class="mt-2 mb-1">PB-2001</h6>
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="text-muted text-decoration-line-through">₹1999</span>
                        <strong class="text-dark">₹1499</strong>
                    </div>
                    <div class="small text-muted mt-1">₹499 advance • 15–20 days</div>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL -->
    <div class="modal fade" id="productModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" id="modalTitle"></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="row g-4">
                        <!-- LEFT: MAIN IMAGE -->
                        <div class="col-md-6 d-flex justify-content-center align-items-center">
                            <img src="" alt="Product Image" id="mainImage" class="main-img" />
                        </div>

                        <!-- RIGHT: DETAILS -->
                        <div class="col-md-6">
                            <h3 class="fw-bold" id="modalTitle2"></h3>
                            <div class="price-wrapper">
                                <span class="mrp-price" id="modalMrp"></span>
                                <span class="sale-price" id="modalSale"></span>
                            </div>
                            <div class="advance-delivery">
                                Advance: <strong id="modalAdvance"></strong><br />
                                Delivery: <strong id="modalDelivery"></strong>
                            </div>
                            <div id="colorName">Color: <span id="colorNameValue"></span></div>
                            <div class="d-flex mb-4" id="colorThumbnailContainer"></div>
                            <div>
                                <label class="fw-semibold d-block mb-2">Size</label>
                                <div class="sizes-grid" id="sizeGrid"></div>
                            </div>
                            <div class="error-msg" id="errorMsg">⚠️ Please select a size</div>
                            <div class="alert alert-warning small mt-4">
                                ⚠️ This is a pre-booking product. Balance amount will be collected before dispatch.
                            </div>
                            <button class="prebook-btn" id="prebookBtn">Pre-Book Now</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // JS remains the same as your previous modern version
        const modal = document.getElementById("productModal");

        let selectedColor = "";
        let selectedSize = null;

        const modalTitle = document.getElementById("modalTitle");
        const modalTitle2 = document.getElementById("modalTitle2");
        const modalMrp = document.getElementById("modalMrp");
        const modalSale = document.getElementById("modalSale");
        const modalAdvance = document.getElementById("modalAdvance");
        const modalDelivery = document.getElementById("modalDelivery");
        const colorNameValue = document.getElementById("colorNameValue");
        const colorThumbnailContainer = document.getElementById("colorThumbnailContainer");
        const sizeGrid = document.getElementById("sizeGrid");
        const mainImage = document.getElementById("mainImage");
        const errorMsg = document.getElementById("errorMsg");
        const prebookBtn = document.getElementById("prebookBtn");

        let images = [];
        let colors = [];
        let sizes = [];

        modal.addEventListener("show.bs.modal", (e) => {
            const card = e.relatedTarget;

            images = JSON.parse(card.dataset.images);
            colors = JSON.parse(card.dataset.colors);
            sizes = JSON.parse(card.dataset.sizes);

            selectedColor = colors[0];
            selectedSize = null;
            errorMsg.style.display = "none";

            modalTitle.innerText = card.dataset.name;
            modalTitle2.innerText = card.dataset.name;
            modalMrp.innerText = `₹${card.dataset.price}`;
            modalSale.innerText = `₹${card.dataset.sale}`;
            modalAdvance.innerText = `₹${card.dataset.advance}`;
            modalDelivery.innerText = card.dataset.delivery;

            updateMainImage(selectedColor);

            colorThumbnailContainer.innerHTML = "";
            colors.forEach((color) => {
                const imgObj = images.find((img) => img.color === color);
                if (!imgObj) return;

                const thumbDiv = document.createElement("div");
                thumbDiv.className = "color-thumb";
                thumbDiv.title = color.charAt(0).toUpperCase() + color.slice(1);
                thumbDiv.innerHTML = `<img src="${imgObj.img}" alt="${color}" />`;

                thumbDiv.addEventListener("click", () => {
                    selectedColor = color;
                    updateMainImage(selectedColor);
                    document.querySelectorAll(".color-thumb").forEach(el => el.classList.remove("selected"));
                    thumbDiv.classList.add("selected");
                });

                thumbDiv.addEventListener("mouseenter", () => {
                    mainImage.src = imgObj.img;
                    colorNameValue.innerText = color.charAt(0).toUpperCase() + color.slice(1);
                });

                thumbDiv.addEventListener("mouseleave", () => {
                    const selectedImgObj = images.find(img => img.color === selectedColor);
                    if (selectedImgObj) mainImage.src = selectedImgObj.img;
                    colorNameValue.innerText = selectedColor.charAt(0).toUpperCase() + selectedColor.slice(1);
                });

                if (color === selectedColor) thumbDiv.classList.add("selected");
                colorThumbnailContainer.appendChild(thumbDiv);
            });

            colorNameValue.innerText = selectedColor.charAt(0).toUpperCase() + selectedColor.slice(1);

            sizeGrid.innerHTML = "";
            sizes.forEach((s) => {
                const div = document.createElement("div");
                div.className = "size-box";
                div.textContent = s;
                div.setAttribute("data-size", s);
                div.addEventListener("click", () => {
                    if (div.classList.contains("disabled")) return;
                    document.querySelectorAll(".size-box").forEach(el => el.classList.remove("selected"));
                    div.classList.add("selected");
                    selectedSize = s;
                    errorMsg.style.display = "none";
                });
                sizeGrid.appendChild(div);
            });
        });

        function updateMainImage(color) {
            selectedColor = color;
            const imgObj = images.find((img) => img.color === color);
            if (imgObj) {
                mainImage.src = imgObj.img;
                colorNameValue.innerText = color.charAt(0).toUpperCase() + color.slice(1);
            }
        }

        prebookBtn.addEventListener("click", () => {
            if (!selectedSize) {
                errorMsg.style.display = "block";
                return;
            }
            alert(`Pre-Booked: Color - ${selectedColor.charAt(0).toUpperCase() + selectedColor.slice(1)}, Size - ${selectedSize}`);
        });
    </script>

</body>

</html>
